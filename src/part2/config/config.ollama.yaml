engine: ollama
model: gemma3:4b        # Ollama tag; quantization is encoded inside the tag itself
quantization: ""        # leave empty — Ollama uses Q4_K_M by default for 4b tag

embedding_model: sentence-transformers/all-MiniLM-L6-v2
colqwen_model: vidore/colqwen2-v0.1

retriever:
  top_k: 3
  similarity_threshold: 0.3
  index_dir: .byaldi_index

parser:
  dpi: 300
  output_dir: .parsed_docs
