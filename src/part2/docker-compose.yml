# Build context for all services is src/part2/ so Dockerfiles can reference
# shared/ and services/<name>/ with paths relative to that root.
#
# GPU note (single T4):
#   parser, visual_indexer, and ollama all request the GPU.
#   They are naturally time-separated: parser runs during indexing,
#   visual_indexer is idle during parsing, ollama runs only during generation.

name: rag-part2

volumes:
  pdf-data:
  parsed-docs:
  byaldi-index:
  qdrant-data:
  redis-data:

networks:
  rag-net:

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks: [rag-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [rag-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    networks: [rag-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── RAG services ─────────────────────────────────────────────────────────────

  parser:
    build:
      context: .
      dockerfile: services/parser/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      PARSED_DIR: /data/parsed
      DPI: "300"
    volumes:
      - pdf-data:/data/pdfs:ro
      - parsed-docs:/data/parsed
    networks: [rag-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  text_indexer:
    build:
      context: .
      dockerfile: services/text_indexer/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      CHUNK_MAX_CHARS: "800"
    networks: [rag-net]
    restart: unless-stopped

  visual_indexer:
    build:
      context: .
      dockerfile: services/visual_indexer/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      COLQWEN_MODEL: vidore/colqwen2-v0.1
      INDEX_DIR: /data/byaldi_index
    volumes:
      - pdf-data:/data/pdfs:ro
      - byaldi-index:/data/byaldi_index
    networks: [rag-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: gemma3:4b
      SIMILARITY_THRESHOLD: "0.3"
      TOP_K: "3"
      RETRIEVE_TIMEOUT: "60"
      PDF_DIR: /data/pdfs
    volumes:
      - pdf-data:/data/pdfs:ro
    networks: [rag-net]
    stdin_open: true
    tty: true
