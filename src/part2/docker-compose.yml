# Build context for all services is src/part2/ so Dockerfiles can reference
# shared/ and services/<name>/ with paths relative to that root.
#
# GPU note (single T4):
#   parser, visual_indexer, and ollama all request the GPU.
#   They are naturally time-separated: parser runs during indexing,
#   visual_indexer is idle during parsing, ollama runs only during generation.
#   For multi-GPU deployments, assign device IDs explicitly via device_ids.

name: rag-part2

volumes:
  pdf-data:          # PDFs mounted into parser + visual_indexer (read-only consumer side)
  parsed-docs:       # Docling output (page images) written by parser
  byaldi-index:      # ColQwen2 index files written by visual_indexer
  qdrant-data:       # Qdrant vector store — persists across docker compose up/down
  kafka-data:

networks:
  rag-net:

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      # KRaft mode — no Zookeeper required
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [rag-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [rag-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    networks: [rag-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── RAG services ─────────────────────────────────────────────────────────────

  parser:
    build:
      context: .
      dockerfile: services/parser/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      PARSED_DIR: /data/parsed
      DPI: "300"
    volumes:
      - pdf-data:/data/pdfs:ro
      - parsed-docs:/data/parsed
    networks: [rag-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  text_indexer:
    build:
      context: .
      dockerfile: services/text_indexer/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      CHUNK_MAX_CHARS: "800"
    networks: [rag-net]
    restart: unless-stopped

  visual_indexer:
    build:
      context: .
      dockerfile: services/visual_indexer/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      COLQWEN_MODEL: vidore/colqwen2-v0.1
    volumes:
      - pdf-data:/data/pdfs:ro
      - byaldi-index:/data/byaldi_index
    networks: [rag-net]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: gemma3:4b
      SIMILARITY_THRESHOLD: "0.3"
      TOP_K: "3"
      RETRIEVE_TIMEOUT: "60"
      PDF_DIR: /data/pdfs
    volumes:
      - pdf-data:/data/pdfs:ro
    networks: [rag-net]
    stdin_open: true
    tty: true
