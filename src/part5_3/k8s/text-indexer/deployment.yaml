apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-indexer
  namespace: rag-system
  labels:
    app: text-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: text-indexer
  template:
    metadata:
      labels:
        app: text-indexer
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
        - name: wait-for-qdrant
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z qdrant 6333; do echo waiting for qdrant; sleep 2; done"]
      containers:
        - name: text-indexer
          image: rag/text-indexer:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: rag-config
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "3Gi"
              cpu: "1000m"
