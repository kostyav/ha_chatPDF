apiVersion: apps/v1
kind: Deployment
metadata:
  name: visual-indexer
  namespace: rag-system
  labels:
    app: visual-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visual-indexer
  template:
    metadata:
      labels:
        app: visual-indexer
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: visual-indexer
          image: rag/visual-indexer:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: rag-config
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          volumeMounts:
            - name: pdf-data
              mountPath: /data/pdfs
              readOnly: true
            - name: byaldi-index
              mountPath: /data/byaldi_index
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "6Gi"
              cpu: "2000m"
          # GPU: ColQwen2 requires GPU for reasonable performance. Uncomment:
          # limits:
          #   nvidia.com/gpu: "1"
      volumes:
        - name: pdf-data
          persistentVolumeClaim:
            claimName: pdf-data
        - name: byaldi-index
          persistentVolumeClaim:
            claimName: byaldi-index
