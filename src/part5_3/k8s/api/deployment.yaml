apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: rag-system
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
        - name: wait-for-ollama
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z ollama 11434; do echo waiting for ollama; sleep 3; done"]
      containers:
        - name: api
          image: rag/api:latest
          imagePullPolicy: Never
          command: ["uvicorn", "src.part4.main:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: rag-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
