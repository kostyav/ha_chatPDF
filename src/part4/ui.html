<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Agent Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #app { width: 100%; max-width: 760px; padding: 24px; display: flex; flex-direction: column; gap: 16px; height: 100vh; }
  h1 { font-size: 1.25rem; font-weight: 600; color: #a78bfa; }
  #history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px; }
  .bubble { padding: 12px 16px; border-radius: 12px; max-width: 90%; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .user { background: #1e293b; align-self: flex-end; }
  .agent { background: #1a1f2e; align-self: flex-start; border: 1px solid #2d3748; }
  .status { font-size: 0.78rem; color: #64748b; font-style: italic; align-self: flex-start; padding: 2px 0; }
  #form { display: flex; gap: 8px; }
  #q { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid #2d3748; background: #1e293b; color: #e2e8f0; font-size: 1rem; outline: none; }
  #q:focus { border-color: #7c3aed; }
  button { padding: 12px 20px; border-radius: 10px; border: none; background: #7c3aed; color: #fff; font-size: 1rem; cursor: pointer; }
  button:disabled { background: #4a3f6b; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <h1>RAG Agent Chat</h1>
  <div id="history"></div>
  <form id="form">
    <input id="q" type="text" placeholder="Ask a question…" autocomplete="off" required>
    <button id="btn" type="submit">Send</button>
  </form>
</div>
<script>
const history = document.getElementById("history");
const form    = document.getElementById("form");
const input   = document.getElementById("q");
const btn     = document.getElementById("btn");

function addBubble(cls, text) {
  const div = document.createElement("div");
  div.className = `bubble ${cls}`;
  div.textContent = text;
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
  return div;
}

function addStatus(text) {
  const div = document.createElement("div");
  div.className = "status";
  div.textContent = text;
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
  return div;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  input.value = "";
  btn.disabled = true;
  addBubble("user", question);

  let statusEl = null;
  const agentBubble = addBubble("agent", "");

  const resp = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question }),
  });

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });

    const parts = buf.split("\n\n");
    buf = parts.pop();

    for (const part of parts) {
      const lines = part.split("\n");
      let event = "message", data = "";
      for (const line of lines) {
        if (line.startsWith("event: ")) event = line.slice(7);
        if (line.startsWith("data: "))  data  = line.slice(6);
      }
      if (!data) continue;
      const payload = JSON.parse(data);

      if (event === "status") {
        if (statusEl) statusEl.remove();
        statusEl = addStatus(payload);
      } else if (event === "token") {
        agentBubble.textContent += payload;
        history.scrollTop = history.scrollHeight;
      } else if (event === "done") {
        if (statusEl) { statusEl.remove(); statusEl = null; }
      }
    }
  }

  btn.disabled = false;
  input.focus();
});
</script>
</body>
</html>
